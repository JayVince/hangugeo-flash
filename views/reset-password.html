<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialiser le mot de passe | 한국어 Flash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-logo">
      <span class="logo-kr">한국어</span>
      <span class="logo-en">Flash</span>
      <span class="logo-blossom">🌸</span>
    </div>
    <p class="auth-tagline">by OppaLingo</p>

    <div class="auth-card">
      <form id="reset-form" class="auth-form">
        <h2 class="auth-form-title">Nouveau mot de passe</h2>
        <div class="form-group">
          <label for="reset-password">Nouveau mot de passe (8 caractères minimum)</label>
          <input type="password" id="reset-password" autocomplete="new-password" minlength="8" required />
        </div>
        <p class="auth-error hidden" id="reset-error"></p>
        <p class="auth-success hidden" id="reset-success"></p>
        <button type="submit" class="btn-primary auth-submit">Mettre à jour mon mot de passe</button>
        <a class="auth-link" href="/login">Retour à la connexion</a>
      </form>
    </div>
  </div>

  <script src="/auth.js" data-page="reset"></script>
</body>
</html>
